name: Build iOS app

on:
  push:
    branches: [master]
  pull_request:
    paths:
      - "capsule-swift/**"
      - "capsule-core/**"
      - "capsule-core-ffi/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "rust-toolchain.toml"
      - ".github/workflows/build-ios.yml"

concurrency:
  group: build-ios-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & test Capsule.app
    runs-on: macos-15
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Set up mise
        uses: jdx/mise-action@v2
        with:
          working_directory: capsule-swift

      - name: Build Rust FFI xcframework
        run: bash capsule-swift/Scripts/build-rust-ffi.sh

      - name: Generate Xcode project
        working-directory: capsule-swift
        run: mise exec -- tuist generate --no-open

      - name: Build & test
        run: |
          set -o pipefail
          xcodebuild test \
            -workspace capsule-swift/Capsule.xcworkspace \
            -scheme Capsule \
            -configuration Debug \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            CODE_SIGNING_ALLOWED=NO | mise -C capsule-swift exec -- xcbeautify
