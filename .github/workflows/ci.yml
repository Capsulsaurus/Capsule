name: CI

on:
  push:
    branches: [master]
  pull_request:

# Cancel superseded runs for the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

# mise is the task runner here, but it must never implicitly install [tools] — each
# job installs exactly what it needs (nextest via taiki-e on the Rust jobs, convco via
# mise on the release/commit-lint jobs). hk is local-only and never installed in CI.
env:
  MISE_AUTO_INSTALL: "false"

jobs:
  # Detect which toolchain's dependency tree changed so each job only runs when relevant.
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      rust: ${{ steps.filter.outputs.rust }}
      web: ${{ steps.filter.outputs.web }}
      docs: ${{ steps.filter.outputs.docs }}
      vision: ${{ steps.filter.outputs.vision }}
      markdown: ${{ steps.filter.outputs.markdown }}
      kotlin: ${{ steps.filter.outputs.kotlin }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            rust:
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'rust-toolchain.toml'
              - 'Cross.toml'
              - 'mise.toml'
              - 'mise-tasks/**'
              - '.config/nextest.toml'
              - 'hk.pkl'
              - '.cargo/**'
              - 'capsule-api/**'
              - 'capsule-cli/**'
              - 'capsule-core/**'
              - 'capsule-media/**'
              - 'capsule-sdk/**'
              - 'xtask/**'
              - '.github/workflows/ci.yml'
            web:
              - 'capsule-web/**'
              - 'mise.toml'
              - 'mise-tasks/**'
              - '.github/workflows/ci.yml'
            docs:
              - 'capsule-docs/**'
              - 'mise.toml'
              - 'mise-tasks/**'
              - '.github/workflows/ci.yml'
            vision:
              - 'capsule-vision/**'
              - 'mise.toml'
              - 'mise-tasks/**'
              - '.github/workflows/ci.yml'
            markdown:
              - '**/*.md'
              - '.markdownlint-cli2.jsonc'
              - 'mise.toml'
              - 'mise-tasks/**'
              - '.github/workflows/ci.yml'
            kotlin:
              - 'capsule-android/**'
              - 'capsule-core-kotlin/**'
              - '**/*.gradle.kts'
              - 'gradle.properties'
              - 'gradle/**'
              - 'gradlew'
              - 'gradlew.bat'
              - '.editorconfig'
              - 'detekt.yml'
              - 'mise.toml'
              - 'mise-tasks/**'
              - '.github/workflows/ci.yml'

  # Enforce Conventional Commits across a PR's commits (convco skips merge commits).
  # Runs on pull_request only; on push to master it is skipped (the `required` gate
  # treats skipped as pass). Tooling is pinned in the root mise.toml.
  commit-lint:
    name: Commit lint (convco)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up convco (via mise)
        uses: jdx/mise-action@v2
        with:
          install_args: convco
      - name: Check commits follow Conventional Commits
        run: convco check --first-parent --ignore-reverts ${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}

  rust:
    name: Rust (fmt + clippy + build)
    needs: changes
    if: ${{ needs.changes.outputs.rust == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Install Rust toolchain
        run: |
          rustup toolchain install
          rustup component add rustfmt clippy
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
      # check-rust runs the verify-examples smoke via nextest.
      - name: Install nextest
        uses: taiki-e/install-action@v2
        with:
          tool: nextest
      - name: Set up mise (task runner)
        uses: jdx/mise-action@v2
        with:
          install: false
      - name: Check (fmt + clippy + build)
        run: mise run check-rust

  rust-test:
    name: Rust (tests)
    needs: changes
    if: ${{ needs.changes.outputs.rust == 'true' }}
    runs-on: ubuntu-latest
    # Non-blocking: capsule-api integration tests use testcontainers (Docker),
    # which is slower and flakier. Drop continue-on-error once stabilized.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Install Rust toolchain
        run: rustup toolchain install
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
      - name: Install nextest
        uses: taiki-e/install-action@v2
        with:
          tool: nextest
      - name: Set up mise (task runner)
        uses: jdx/mise-action@v2
        with:
          install: false
      - name: Test
        env:
          NEXTEST_PROFILE: ci
        run: mise run test-rust

  # Verify capsule-core cross-compiles to the formally supported targets (mobile +
  # desktop). Tier 1 (Apple, Android) gates; Tier 2 (Windows MSVC, aarch64 Linux)
  # is best-effort via continue-on-error. The host x86_64 Linux Tier-1 target is
  # already covered by the `rust` job's workspace build.
  rust-cross:
    name: Rust cross (${{ matrix.name }})
    needs: changes
    if: ${{ needs.changes.outputs.rust == 'true' }}
    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.tier2 }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: apple
            os: macos-14
            recipe: build-apple
            targets: aarch64-apple-darwin x86_64-apple-darwin aarch64-apple-ios aarch64-apple-ios-sim x86_64-apple-ios
            tier2: false
          - name: android
            os: ubuntu-latest
            recipe: build-android
            targets: aarch64-linux-android armv7-linux-androideabi x86_64-linux-android i686-linux-android
            tier2: false
          - name: windows
            os: windows-latest
            recipe: build-windows
            targets: x86_64-pc-windows-msvc
            tier2: true
          - name: linux-arm64
            os: ubuntu-latest
            recipe: build-linux-cross
            targets: aarch64-unknown-linux-gnu
            tier2: true
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        run: |
          rustup toolchain install
          rustup target add ${{ matrix.targets }}
      - name: Set up Android NDK
        if: matrix.name == 'android'
        id: ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r27c
      - name: Export ANDROID_NDK_HOME
        if: matrix.name == 'android' && steps.ndk.outputs.ndk-path != ''
        run: echo "ANDROID_NDK_HOME=${{ steps.ndk.outputs.ndk-path }}" >> "$GITHUB_ENV"
      - name: Install cargo-ndk
        if: matrix.name == 'android'
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-ndk
      - name: Install cross
        if: matrix.name == 'linux-arm64'
        uses: taiki-e/install-action@v2
        with:
          tool: cross
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: cross-${{ matrix.name }}
      - name: Set up mise (task runner)
        uses: jdx/mise-action@v2
        with:
          install: false
      - name: Build target
        run: mise run ${{ matrix.recipe }}

  web:
    name: Web (format + lint + test + build)
    needs: changes
    if: ${{ needs.changes.outputs.web == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Cache bun install
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-web-${{ runner.os }}-${{ hashFiles('capsule-web/bun.lock') }}
          restore-keys: bun-web-${{ runner.os }}-
      - name: Install dependencies
        working-directory: capsule-web
        run: bun install --frozen-lockfile
      - name: Set up mise (task runner)
        uses: jdx/mise-action@v2
        with:
          install: false
      - name: Check (format + lint + test + build)
        run: mise run check-web

  docs:
    name: Docs (format + lint + build)
    needs: changes
    if: ${{ needs.changes.outputs.docs == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Cache bun install
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-docs-${{ runner.os }}-${{ hashFiles('capsule-docs/bun.lock') }}
          restore-keys: bun-docs-${{ runner.os }}-
      - name: Install dependencies
        working-directory: capsule-docs
        run: bun install --frozen-lockfile
      - name: Set up mise (task runner)
        uses: jdx/mise-action@v2
        with:
          install: false
      - name: Check (format + lint + build)
        run: mise run check-docs

  vision:
    name: Vision (format + lint)
    needs: changes
    if: ${{ needs.changes.outputs.vision == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-dependency-glob: capsule-vision/uv.lock
      - name: Install Python and sync deps
        working-directory: capsule-vision
        run: uv sync --frozen
      - name: Set up mise (task runner)
        uses: jdx/mise-action@v2
        with:
          install: false
      - name: Check (format + lint)
        run: mise run check-vision

  markdown:
    name: Markdown (lint)
    needs: changes
    if: ${{ needs.changes.outputs.markdown == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Set up mise (task runner)
        uses: jdx/mise-action@v2
        with:
          install: false
      - name: Check (markdown lint)
        run: mise run check-md

  kotlin:
    name: Kotlin (ktlint + detekt)
    needs: changes
    if: ${{ needs.changes.outputs.kotlin == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Gradle 8.11.1 supports JDK 21 (not the JDK 26 used on some dev machines).
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      # The :android module applies the Android Gradle Plugin, so Gradle needs the SDK
      # (compileSdk 36) just to configure — even for the ktlint/detekt tasks.
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
      - name: Install Android platform
        run: sdkmanager "platforms;android-36"
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
      - name: Set up mise (task runner)
        uses: jdx/mise-action@v2
        with:
          install: false
      - name: Check (ktlint + detekt)
        run: mise run check-kotlin

  # Single aggregated status check. Mark THIS ("CI / required") as the required
  # check in branch protection — path-filtered jobs report "skipped", which this
  # treats as a pass. rust-test is non-blocking and intentionally excluded.
  required:
    name: required
    if: always()
    needs: [changes, commit-lint, rust, rust-test, rust-cross, web, docs, vision, markdown, kotlin]
    runs-on: ubuntu-latest
    steps:
      - name: Verify required jobs succeeded
        run: |
          for r in "${{ needs.commit-lint.result }}" "${{ needs.rust.result }}" "${{ needs.rust-cross.result }}" \
                   "${{ needs.web.result }}" \
                   "${{ needs.docs.result }}" "${{ needs.vision.result }}" \
                   "${{ needs.markdown.result }}" "${{ needs.kotlin.result }}"; do
            if [ "$r" = "failure" ] || [ "$r" = "cancelled" ]; then
              echo "A required job did not pass (result: $r)."
              exit 1
            fi
          done
          echo "All required jobs passed or were skipped."
