# Git hooks delegate to the justfile (single source of truth for commands).
# Globs keep execution selective: a hook only runs when matching files are staged.

pre-commit:
  parallel: false
  commands:
    # Priority 1: auto-fix formatting
    format-rust:
      priority: 1
      glob: "**/*.rs"
      run: just format-rust
    format-web:
      priority: 1
      glob: "capsule-web/**/*.{ts,tsx,js,jsx,json,jsonc,css}"
      run: just format-web
    format-docs:
      priority: 1
      glob: "capsule-docs/**/*.{ts,tsx,js,jsx,json,jsonc,css,astro,md,mdx}"
      run: just format-docs
    format-kotlin:
      priority: 1
      glob: "**/*.{kt,kts}"
      run: just format-kotlin
    format-vision:
      priority: 1
      glob: "capsule-vision/**/*.{py,ipynb}"
      run: just format-vision
    format-swift:
      priority: 1
      glob: "{capsule-swift,capsule-core-swift}/**/*.swift"
      run: just format-swift
      skip:
        - run: "[ \"$(uname)\" != \"Darwin\" ]"

    # Priority 2: auto-fix linting
    lint-web:
      priority: 2
      glob: "capsule-web/**/*.{ts,tsx,js,jsx,json,jsonc,css}"
      run: just lint-web
    lint-docs:
      priority: 2
      glob: "capsule-docs/**/*.{ts,tsx,js,jsx,json,jsonc,css,astro,md,mdx}"
      run: just lint-docs
    lint-vision:
      priority: 2
      glob: "capsule-vision/**/*.{py,ipynb}"
      run: just lint-vision
    lint-md:
      priority: 2
      glob: "**/*.md"
      run: just lint-md

    # Priority 3: fail if any files changed (formatters/linters mutated staged files)
    diff-check:
      priority: 3
      run: git diff --exit-code
      fail_text: |
        Formatters or linters modified staged files.
        Review the changes with `git diff`, stage them with `git add`, then commit again.

pre-push:
  parallel: false
  commands:
    # Priority 0: Conventional Commits check over the range being pushed.
    check-commits:
      priority: 0
      run: just check-commits

    # Priority 1: all format/lint checks (read-only, no writes)
    format-check-rust:
      priority: 1
      glob: "**/*.rs"
      run: just format-check-rust
    lint-check-rust:
      priority: 1
      glob: "**/*.rs"
      run: just lint-check-rust
    format-check-web:
      priority: 1
      glob: "capsule-web/**/*.{ts,tsx,js,jsx,json,jsonc,css}"
      run: just format-check-web
    lint-check-web:
      priority: 1
      glob: "capsule-web/**/*.{ts,tsx,js,jsx,json,jsonc,css}"
      run: just lint-check-web
    format-check-docs:
      priority: 1
      glob: "capsule-docs/**/*.{ts,tsx,js,jsx,json,jsonc,css,astro,md,mdx}"
      run: just format-check-docs
    lint-check-docs:
      priority: 1
      glob: "capsule-docs/**/*.{ts,tsx,js,jsx,json,jsonc,css,astro,md,mdx}"
      run: just lint-check-docs
    format-check-kotlin:
      priority: 1
      glob: "**/*.{kt,kts}"
      run: just format-check-kotlin
    lint-check-kotlin:
      priority: 1
      glob: "**/*.{kt,kts}"
      run: just lint-check-kotlin
    format-check-vision:
      priority: 1
      glob: "capsule-vision/**/*.{py,ipynb}"
      run: just format-check-vision
    lint-check-vision:
      priority: 1
      glob: "capsule-vision/**/*.{py,ipynb}"
      run: just lint-check-vision
    format-check-swift:
      priority: 1
      glob: "{capsule-swift,capsule-core-swift}/**/*.swift"
      run: just format-check-swift
      skip:
        - run: "[ \"$(uname)\" != \"Darwin\" ]"
    lint-check-swift:
      priority: 1
      glob: "{capsule-swift,capsule-core-swift}/**/*.swift"
      run: just lint-check-swift
      skip:
        - run: "[ \"$(uname)\" != \"Darwin\" ]"
    lint-check-md:
      priority: 1
      glob: "**/*.md"
      run: just lint-check-md

    # Priority 2: tests
    test-rust:
      priority: 2
      glob: "**/*.rs"
      run: just test-rust
    test-web:
      priority: 2
      glob: "capsule-web/**/*.{ts,tsx,js,jsx}"
      run: just test-web

# Validate the message of the commit being written (Conventional Commits).
commit-msg:
  commands:
    convco:
      run: just commit-check {1}
